apiVersion: apps/v1
kind: Deployment

metadata:
  name: hello-world
  labels:
    app: hello-world

spec:
  replicas: 1

  selector:
    matchLabels:
      app: hello-world

  template:
    metadata:
      labels:
        app: hello-world

    spec:
      volumes:
        - name: common-disk
          emptyDir: {}

      initContainers:
        - name: busybox
          image: busybox

          volumeMounts:
            - name: common-disk
              mountPath: /web-files

          command:
            - /bin/sh
            - -c
            - |
              cat <<EOF > /web-files/index.html
              <html>
              <head>
                <title>Hello World</title>
              </head>
              <body style="font-family: Arial; text-align:center; margin-top:50px;">
                <h1>Hello World 🐍</h1>
                <h2>Snake</h2>
              </body>
              </html>
              EOF

      containers:
        - name: nginx
          image: nginx

          resources:
            requests:
              memory: "12Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "500m"

          ports:
            - containerPort: 80

          volumeMounts:
            - name: common-disk
              mountPath: /usr/share/nginx/html

---
apiVersion: v1
kind: Service

metadata:
  name: hello-world
  labels:
    app: hello-world

spec:
  type: ClusterIP

  selector:
    app: hello-world

  ports:
    - port: 80
      targetPort: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: hello-world-ingress
  annotations:
    kubernetes.io/ingress.class: nginx

spec:
  tls:
    - hosts:
        - snake.test.local
      secretName: hello-world-tls

  rules:
    - host: snake.test.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hello-world
                port:
                  number: 80
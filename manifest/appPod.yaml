apiVersion: v1
kind: Pod

metadata:
  name: appdb
  labels:
      app: appdb

spec:
  containers:
    - name: appdb
      image: docker.io/mariadb:latest
      imagePullPolicy: Always

      env:
        - name: MYSQL_USER
          value: "testuser"
        - name: MYSQL_PASSWORD
          value: "mypa55"
        - name: MYSQL_ROOT_PASSWORD
          value: "r00tpa55"
        - name: MYSQL_DATABASE
          value: "magicball"

      ports:
        - containerPort: 53306
          protocol: TCP

      resources:
        requests:
          cpu: "250m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
apiVersion: apps/v1
kind: Deployment

metadata:
  name: appdb
  labels:
    app: appdb

spec:
  replicas: 3

  selector:
    matchLabels:
      app: appdb

  template:
    metadata:
      labels:
        app: appdb

    spec:
      containers:
        - name: appdb
          image: docker.io/mariadb:latest
          imagePullPolicy: Always

          env: 
            - name: MYSQL_USER
              value: "testuser"
            - name: MYSQL_PASSWORD
              value: "mypa55"
            - name: MYSQL_ROOT_PASSWORD
              value: "r00tpa55"
            - name: MYSQL_DATABASE
              value: "magicball"

          ports:
            - containerPort: 63306
              protocol: TCP
          restartPolicy: Always
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 15
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 30
            periodSeconds: 20

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"